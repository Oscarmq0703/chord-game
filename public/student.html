<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>学生答题 - 和弦课堂神器</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="studentShell">
    <div class="studentContainer">

      <!-- 顶部栏 -->
      <div class="topbar studentTopbar">
        <div class="brand">
          <div class="logo">🎓</div>
          <div>
            <div class="brandTitle">学生答题</div>
            <div class="brandSub">Classroom Pro · 横屏推荐</div>
          </div>
        </div>
        <div class="badge"><span class="dot"></span> 已连接课堂</div>
      </div>

      <!-- 姓名栏 -->
      <div class="card pad studentNameBar">
        <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;">
          <div style="color:var(--muted); font-weight:700;">姓名</div>
          <input id="nameInput" class="input" placeholder="请输入姓名" />
          <button id="nameBtn" class="btn primary" type="button">确定</button>
          <div class="p" style="margin-left:6px;">姓名会显示在教师端</div>
        </div>
      </div>

      <!-- 题目卡（更扁） -->
      <div class="card pad studentQuestionCard">
        <div class="p labelT">请弹奏</div>
        <div id="questionText" class="noteT">--</div>

        <!-- 进度 + AI 建议：压成一行，省空间 -->
        <div style="margin-top:6px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
          <div class="badge">进度：<b id="progressText" style="color:var(--text)">完成 0 ｜ 正确 0</b></div>
          <div class="p" id="aiHint" style="flex:1; min-width:220px;">
            请输入姓名后开始作答。
          </div>
        </div>

        <!-- 仍保留两个数字（给 student.js 更新用），但不占视觉空间 -->
        <div style="display:none">
          <span id="correctNum">0</span>
          <span id="totalNum">0</span>
        </div>
      </div>

      <!-- 键盘：占满剩余高度 -->
      <div class="studentStage">
        <div class="studentPianoWrap">
          <div id="piano" class="piano"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="piano.js"></script>
  <script src="student.js"></script>
  <script>
    // 键盘必须渲染
    window.addEventListener("DOMContentLoaded", () => {
      if (typeof window.buildPiano === "function") {
        window.buildPiano("piano");
      } else {
        console.error("buildPiano not found (piano.js not loaded).");
      }
    });
  </script>
</body>
</html>
