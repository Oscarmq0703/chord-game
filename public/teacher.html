<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>教师控制台 - 和弦课堂神器</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="shell">
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo">🧑‍🏫</div>
          <div>
            <div class="brandTitle">教师控制台</div>
            <div class="brandSub">Classroom Pro · 实时统计</div>
          </div>
        </div>
        <div class="badge"><span class="dot"></span> 已连接课堂</div>
      </div>

      <div class="grid">
        <div class="card pad">
          <h1 class="h1">本节课实时概览</h1>
          <p class="p">投屏建议：浏览器全屏（F11）。</p>

          <div class="kpiRow">
            <div class="kpi">
              <p class="label">在线人数</p>
              <p class="value" id="students">0</p>
            </div>
            <div class="kpi">
              <p class="label">正确率</p>
              <p class="value"><span id="accuracy">0</span>%</p>
            </div>
          </div>

          <div class="footer">学生每次作答都会更新统计。</div>
        </div>

        <div class="card pad">
          <h2 class="h2">在线学生名单</h2>
          <p class="p">显示姓名 + 完成/正确（姓名由学生端提交）。</p>

          <div id="roster" style="margin-top:12px; display:flex; flex-direction:column; gap:10px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="teacher.js"></script>
</body>
</html>
