<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>学生答题 - 和弦课堂神器</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- ✅ Tone.js 必须在 piano.js 之前 -->
  <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
</head>

<body>
  <div class="studentShell">
    <div class="studentContainer studentNoScroll">

      <div class="card topBlock">
        <div class="topRow1">
          <div class="r1Left">
            <div class="logoSm">🎓</div>
            <div class="tlTitle">
              <div class="t1">学生答题</div>
              <div class="t2">横屏推荐</div>
            </div>
          </div>

          <div class="r1Mid">
            <span class="muted">姓名</span>
            <input id="nameInput" class="input inputSm" placeholder="请输入姓名" />
            <button id="nameBtn" class="btn primary btnSm" type="button">确定</button>
          </div>

          <div class="r1Right">
            <div class="badge badgeSm"><span class="dot"></span> 已连接课堂</div>
          </div>
        </div>

        <div class="topRow2">
          <div class="r2Left">
            <span class="muted">请弹奏</span>
            <span id="questionText" class="qNote">--</span>
          </div>

          <div class="r2Mid">
            <div class="badge badgeSm">进度：<b id="progressText" style="color:var(--text)">完成 0 ｜ 正确 0</b></div>
          </div>

          <div class="r2Right">
            <span class="muted">AI</span>
            <span id="aiHint" class="aiText2">每 10 题更新一次反馈。</span>
          </div>

          <span id="correctNum" style="display:none">0</span>
          <span id="totalNum" style="display:none">0</span>
        </div>
      </div>

      <div class="studentStage">
        <div class="studentPianoWrap">
          <!-- ✅ 键盘容器 -->
          <div id="piano" class="piano"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="piano.js"></script>
  <script src="student.js"></script>

  <script>
    function renderPianoSafe() {
      try {
        if (typeof window.buildPiano === "function") {
          window.buildPiano("piano");
        } else {
          console.error("buildPiano not found (piano.js not loaded).");
        }
      } catch (e) {
        console.error("buildPiano crashed:", e);
      }
    }

    // ✅ DOMContentLoaded + load 双保险（移动端有时 layout 迟到）
    window.addEventListener("DOMContentLoaded", renderPianoSafe);
    window.addEventListener("load", () => setTimeout(renderPianoSafe, 50));
  </script>
</body>
</html>
