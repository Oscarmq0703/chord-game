<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Student</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    html, body { height: 100%; margin: 0; }
    .studentShell { min-height: 100vh; display:flex; justify-content:center; padding:10px; }
    .studentContainer { width: min(1040px, 100%); height: calc(100vh - 20px); display:flex; flex-direction:column; gap:6px; }
    .studentStage { flex: 1 1 auto; min-height: 0; display:flex; align-items:flex-start; }
    .studentPianoWrap { flex: 1 1 auto; min-height: 0; display:flex; }
    #piano { width: 100%; height: clamp(190px, 42vh, 320px); border-radius: 16px; }
    #debugBar { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; text-align:center; color:#9aa3b2; }
  </style>

<script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
<script src="audio.js?v=1"></script>

  <script>
    function DBG(msg){
      var el = document.getElementById("debugBar");
      if (el) el.textContent = msg;
      try { console.log("[DBG]", msg); } catch(e) {}
    }
    window.addEventListener("error", function(e){
      var m = "";
      try { m = e && e.message ? e.message : String(e); } catch(_) { m = "error"; }
      DBG("debug: ERROR: " + m);
    });
  </script>
</head>

<body>
  <div class="studentShell">
    <div class="studentContainer">

      <div class="card topBlock">
        <div class="topRow1">
          <div class="r1Left">
            <div class="logoSm">S</div>
            <div class="tlTitle">
              <div class="t1">Student</div>
              <div class="t2">Landscape recommended</div>
            </div>
          </div>

          <div class="r1Mid">
            <span class="muted">Name</span>
            <input id="nameInput" class="input inputSm" placeholder="Your name" />
            <button id="nameBtn" class="btn primary btnSm" type="button">OK</button>
          </div>

          <div class="r1Right">
            <div class="badge badgeSm"><span class="dot"></span> Connected</div>
          </div>
        </div>

        <div class="topRow2">
          <div class="r2Left">
            <span class="muted">Play</span>
            <span id="questionText" class="qNote">--</span>
          </div>

          <div class="r2Mid">
            <div class="badge badgeSm">Progress: <b id="progressText" style="color:var(--text)">0</b></div>
          </div>

          <div class="r2Right">
            <span class="muted">AI</span>
            <span id="aiHint" class="aiText2">Every 10 questions.</span>
          </div>

          <span id="correctNum" style="display:none">0</span>
          <span id="totalNum" style="display:none">0</span>
        </div>
      </div>

      <div class="studentStage">
        <div class="studentPianoWrap">
          <div id="piano"></div>
        </div>
      </div>

      <div id="debugBar">debug: waiting...</div>
    </div>
  </div>

  <script>
    (function(){
      var WHITE = ["C4","D4","E4","F4","G4","A4","B4","C5","D5","E5","F5","G5","A5","B5"];
      var BLACK = [
        {n:"C#4",a:0},{n:"D#4",a:1},{n:"F#4",a:3},{n:"G#4",a:4},{n:"A#4",a:5},
        {n:"C#5",a:7},{n:"D#5",a:8},{n:"F#5",a:10},{n:"G#5",a:11},{n:"A#5",a:12}
      ];

      function positionBlacks(mount){
        var whiteRow = mount.querySelector(".piano-white-row");
        var blackLayer = mount.querySelector(".piano-black-layer");
        if(!whiteRow || !blackLayer) return;

        var whites = Array.prototype.slice.call(whiteRow.querySelectorAll(".white-key"));
        var blacks = Array.prototype.slice.call(blackLayer.querySelectorAll(".black-key"));
        if(whites.length < 2 || blacks.length === 0) return;

        var wW = whites[0].offsetWidth;
        var wH = whites[0].offsetHeight;

        var bW = Math.max(18, Math.min(wW * 0.62, 46));
        var bH = Math.max(70, Math.min(wH * 0.62, wH - 14));

        for (var i=0;i<blacks.length;i++){
          blacks[i].style.width = bW + "px";
          blacks[i].style.height = bH + "px";
        }
        blackLayer.style.height = bH + "px";

        requestAnimationFrame(function(){
          for (var j=0;j<blacks.length;j++){
            var k = blacks[j];
            var after = Number(k.dataset.afterWhite);
            var L = whites[after];
            var R = whites[after+1];
            if(!L || !R) continue;
            var center = (L.offsetLeft + L.offsetWidth + R.offsetLeft) / 2;
            k.style.left = (center - (k.offsetWidth/2)) + "px";
          }
        });
      }

      function build(){
        DBG("debug: building piano...");
        var mount = document.getElementById("piano");
        if(!mount){ DBG("debug: #piano missing"); return; }

        mount.innerHTML = "";
        mount.style.background = "rgba(0,0,0,.22)";
        mount.style.border = "1px solid rgba(255,255,255,.12)";
        mount.style.borderRadius = "16px";
        mount.style.position = "relative";
        mount.style.overflow = "visible";
        mount.style.transform = "none";

        var whiteRow = document.createElement("div");
        whiteRow.className = "piano-white-row";
        whiteRow.style.position = "absolute";
        whiteRow.style.inset = "0";
        whiteRow.style.display = "flex";
        mount.appendChild(whiteRow);

        var blackLayer = document.createElement("div");
        blackLayer.className = "piano-black-layer";
        blackLayer.style.position = "absolute";
        blackLayer.style.left = "0";
        blackLayer.style.top = "0";
        blackLayer.style.width = "100%";
        blackLayer.style.pointerEvents = "none";
        mount.appendChild(blackLayer);

        function emit(note){
  // show whether audio hook exists
  if (typeof window.playNote === "function") {
    // try audio first (user gesture)
    window.playNote(note);
    DBG("debug: key pressed, calling playNote(" + note + ")");
  } else {
    DBG("debug: playNote missing (audio.js not loaded)");
  }

  // keep your quiz event
  try { document.dispatchEvent(new CustomEvent("notePlayed", { detail: note })); } catch(e) {}
}

        for (var i=0;i<WHITE.length;i++){
          var note = WHITE[i];
          var k = document.createElement("button");
          k.type = "button";
          k.className = "white-key";
          k.style.flex = "1 1 auto";
          k.style.minWidth = "46px";
          k.style.height = "100%";
          k.style.border = "1px solid rgba(0,0,0,.18)";
          k.style.borderTop = "none";
          k.style.background = "linear-gradient(180deg,#ffffff,#e9eefc)";
          k.style.borderBottomLeftRadius = "10px";
          k.style.borderBottomRightRadius = "10px";
          k.style.padding = "0";
          k.style.cursor = "pointer";
          k.style.touchAction = "manipulation";
          (function(n){ k.addEventListener("click", function(){ emit(n); }); })(note);
          whiteRow.appendChild(k);
        }

        for (var j=0;j<BLACK.length;j++){
          var b = BLACK[j];
          var bk = document.createElement("button");
          bk.type = "button";
          bk.className = "black-key";
          bk.dataset.afterWhite = String(b.a);
          bk.style.pointerEvents = "auto";
          bk.style.position = "absolute";
          bk.style.top = "0";
          bk.style.border = "1px solid rgba(255,255,255,.10)";
          bk.style.background = "linear-gradient(180deg,#1a1a1a,#000)";
          bk.style.borderBottomLeftRadius = "8px";
          bk.style.borderBottomRightRadius = "8px";
          bk.style.boxShadow = "0 10px 20px rgba(0,0,0,.45)";
          bk.style.cursor = "pointer";
          bk.style.padding = "0";
          bk.style.touchAction = "manipulation";
          (function(n){ bk.addEventListener("click", function(ev){ ev.stopPropagation(); emit(n); }); })(b.n);
          blackLayer.appendChild(bk);
        }

        requestAnimationFrame(function(){
          positionBlacks(mount);
          setTimeout(function(){ positionBlacks(mount); }, 180);
        });

        window.addEventListener("resize", function(){ positionBlacks(mount); });
        window.addEventListener("orientationchange", function(){ setTimeout(function(){ positionBlacks(mount); }, 260); });
        if (window.visualViewport){
          window.visualViewport.addEventListener("resize", function(){ positionBlacks(mount); });
          window.visualViewport.addEventListener("scroll", function(){ positionBlacks(mount); });
        }

        DBG("debug: piano rendered OK (tap a key for audio)");
      }

      build();

    })();
  </script>

  <script src="student.js"></script>
</body>
</html>
