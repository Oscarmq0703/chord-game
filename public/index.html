<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>和弦课堂神器</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>

<body>
  <div class="shell">
    <div class="container">
      <div class="topbar">
        <div class="brand">
          <div class="logo">🎹</div>
          <div>
            <div class="title">和弦课堂神器</div>
            <div class="tag">Classroom Pro · 课堂一键开房</div>
          </div>
        </div>
        <div class="badge"><span class="dot"></span> 系统在线</div>
      </div>

      <div class="grid">
        <div class="card pad">
          <h1 class="h1">扫码即进 · 实时统计 · 每 10 题 AI 反馈</h1>
          <p class="p">
            本页会自动生成本节课房间二维码。学生扫码进入答题；教师端可投屏展示在线人数、正确率与学习建议。
          </p>

          <div class="actions">
            <a id="teacherLink" class="btn primary" href="teacher.html">🧑‍🏫 进入教师控制台</a>
            <button id="newRoomBtn" class="btn" type="button">🔄 刷新新房间</button>
            <button id="copyBtn" class="btn ghost" type="button">📋 复制学生链接</button>
          </div>

          <div style="margin-top:14px;">
            <div class="badge">本节课房间：<b id="roomText" style="color:var(--text)">…</b></div>
            <div style="margin-top:10px;">
              <code class="code" id="joinUrlText">…</code>
            </div>
          </div>

          <div class="footer">提示：上课前先打开本页面，可唤醒 Render 服务，学生进入更顺畅。</div>
        </div>

        <div class="card pad" style="text-align:center;">
          <h2 class="h1" style="font-size:20px;margin-bottom:6px;">学生扫码进入</h2>
          <p class="p" style="margin-bottom:10px;">建议学生横屏作答</p>
          <div class="qrWrap" id="qrcode"></div>
          <p class="p" style="margin-top:10px;">若扫码打不开，可复制链接手动打开</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function genRoom() {
      return Math.random().toString(36).slice(2, 8).toUpperCase();
    }
    function buildUrls(room) {
      const joinUrl = `${location.origin}/student.html?room=${encodeURIComponent(room)}`;
      const teacherUrl = `${location.origin}/teacher.html?room=${encodeURIComponent(room)}`;
      return { joinUrl, teacherUrl };
    }
    function renderQR(text) {
      const box = document.getElementById("qrcode");
      box.innerHTML = "";
      QRCode.toCanvas(text, { width: 240, margin: 1 }, (err, canvas) => {
        if (err) { box.innerHTML = "<b style='color:#111'>二维码生成失败</b>"; console.error(err); return; }
        box.appendChild(canvas);
      });
    }
    function applyRoom(room) {
      const { joinUrl, teacherUrl } = buildUrls(room);
      document.getElementById("roomText").textContent = room;
      document.getElementById("joinUrlText").textContent = joinUrl;
      document.getElementById("teacherLink").href = teacherUrl;
      renderQR(joinUrl);
      localStorage.setItem("CLASSROOM_ROOM", room);
    }
    function currentRoom() {
      return localStorage.getItem("CLASSROOM_ROOM") || genRoom();
    }

    window.addEventListener("DOMContentLoaded", () => {
      applyRoom(currentRoom());

      document.getElementById("newRoomBtn").addEventListener("click", () => {
        applyRoom(genRoom());
      });

      document.getElementById("copyBtn").addEventListener("click", async () => {
        const text = document.getElementById("joinUrlText").textContent;
        try {
          await navigator.clipboard.writeText(text);
          const btn = document.getElementById("copyBtn");
          const old = btn.textContent;
          btn.textContent = "✅ 已复制";
          setTimeout(() => (btn.textContent = old), 900);
        } catch (e) {
          alert("复制失败，请长按链接手动复制。");
        }
      });
    });
  </script>
</body>
</html>

      <div class="actions">
        <a id="teacherLink" class="btn primary" href="teacher.html">🧑‍🏫 进入教师控制台</a>
        <button id="newRoomBtn" class="btn" type="button">🔄 刷新新房间</button>
        <button id="copyBtn" class="btn small" type="button">📋 复制学生链接</button>
      </div>

      <div style="margin-top:14px;">
        <div class="roomPill">
          本节课房间：<span class="kbd" id="roomText">…</span>
        </div>
        <div style="margin-top:10px;">
          <code id="joinUrlText">…</code>
        </div>
      </div>
    </div>

    <!-- 右侧：二维码 -->
    <div class="card right">
      <div class="qrWrap" id="qrcode"></div>
      <p class="hint">
        学生打开手机扫码进入答题<br/>
        若打不开，请使用下方链接手动进入
      </p>
    </div>

    <div class="footer">
      提示：上课前先打开本页面，可唤醒 Render 服务，学生进入更顺畅。
    </div>
  </div>

  <script>
    // 生成短房间号：6位大写字母数字
    function genRoom() {
      return Math.random().toString(36).slice(2, 8).toUpperCase();
    }

    function buildUrls(room) {
      const joinUrl = `${location.origin}/student.html?room=${encodeURIComponent(room)}`;
      const teacherUrl = `${location.origin}/teacher.html?room=${encodeURIComponent(room)}`;
      return { joinUrl, teacherUrl };
    }

    function renderQR(text) {
      const box = document.getElementById("qrcode");
      box.innerHTML = "";
      QRCode.toCanvas(text, { width: 240, margin: 1 }, (err, canvas) => {
        if (err) {
          box.innerHTML = "<div style='color:#111827;font-weight:700'>二维码生成失败</div>";
          console.error(err);
          return;
        }
        box.appendChild(canvas);
      });
    }

    function applyRoom(room) {
      const { joinUrl, teacherUrl } = buildUrls(room);
      document.getElementById("roomText").textContent = room;
      document.getElementById("joinUrlText").textContent = joinUrl;
      document.getElementById("teacherLink").href = teacherUrl;
      renderQR(joinUrl);
      // 也把房间号存一下，避免误刷新可找回（同一浏览器）
      localStorage.setItem("CLASSROOM_ROOM", room);
    }

    function currentRoom() {
      // 优先用本地缓存（避免误刷新丢房间），没有就新生成
      return localStorage.getItem("CLASSROOM_ROOM") || genRoom();
    }

    window.addEventListener("DOMContentLoaded", () => {
      applyRoom(currentRoom());

      document.getElementById("newRoomBtn").addEventListener("click", () => {
        const room = genRoom();
        applyRoom(room);
      });

      document.getElementById("copyBtn").addEventListener("click", async () => {
        const text = document.getElementById("joinUrlText").textContent;
        try {
          await navigator.clipboard.writeText(text);
          const btn = document.getElementById("copyBtn");
          const old = btn.textContent;
          btn.textContent = "✅ 已复制";
          setTimeout(() => (btn.textContent = old), 900);
        } catch (e) {
          alert("复制失败，请长按链接手动复制。");
        }
      });
    });
  </script>
</body>
</html>
